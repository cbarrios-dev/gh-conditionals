name: Reusable Workflow
on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the artifact to download"
        required: true
        default: dist
        type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact-name }}
      - name: List files
        run: ls
      - name: Output message
        run: echo 'Deploying application...'
